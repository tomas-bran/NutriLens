name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  IA_PROVIDER: mock # CI must never call Azure
  DATABASE_URL: postgresql://nutrilens:nutrilens@localhost:5432/nutrilens

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + format check (fast, fail early)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # 2. TypeScript type check
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type check
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # 2b. Mobile app checks (Expo / React Native)
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: nutrilens-mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: nutrilens-mobile
        run: npm ci
      - name: Mobile type check
        working-directory: nutrilens-mobile
        run: npm run typecheck
      - name: Mobile tests
        working-directory: nutrilens-mobile
        run: npm test -- --silent

  # ---------------------------------------------------------------------------
  # 3. Unit + integration tests with coverage thresholds
  # ---------------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nutrilens
          POSTGRES_PASSWORD: nutrilens
          POSTGRES_DB: nutrilens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nutrilens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Build (also validates types and env vars)
  # ---------------------------------------------------------------------------
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # 5. E2E Playwright (PRs to main and pushes to main only)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # Skip on feature branches to keep them fast.
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nutrilens
          POSTGRES_PASSWORD: nutrilens
          POSTGRES_DB: nutrilens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nutrilens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed DB for E2E
        run: npm run seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          IA_PROVIDER: mock
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Final gate: required checks must pass for merging.
  # Configure in GitHub: Settings → Branches → Branch protection rules for main
  # → required status checks: lint, typecheck, mobile, test, build, ci-success.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, mobile, test, build, e2e]
    if: always()
    steps:
      - name: Verify all required checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.mobile.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "Required checks failed"
            exit 1
          fi
          # E2E is "skipped" on feature branches and "success" on PRs to main.
          if [[ "${{ needs.e2e.result }}" != "success" && \
                "${{ needs.e2e.result }}" != "skipped" ]]; then
            echo "E2E checks failed"
            exit 1
          fi
          echo "All CI checks passed"
