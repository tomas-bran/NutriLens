name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancelar runs duplicados sobre la misma branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  IA_PROVIDER: mock           # Nunca usar Foundry/Azure desde CI
  DATABASE_URL: 'file:./test.db'

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + format check (rápido, falla temprano)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # 2. TypeScript type check
  # ---------------------------------------------------------------------------
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Type check
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # 3. Unit + integration tests con coverage threshold
  # ---------------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Build (también valida que types y env vars estén bien)
  # ---------------------------------------------------------------------------
  build:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 5. E2E Playwright (solo en PRs a main o push a main)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # Solo correr en PRs a main o push a main (lento, evitamos en feature branches)
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed DB para E2E
        run: npm run seed
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          IA_PROVIDER: mock
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload Playwright traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Gate final: required checks tienen que pasar para mergear
  # En GitHub: Settings → Branches → Branch protection rules para main
  # marcar como required: lint, typecheck, test, build, e2e
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, e2e]
    if: always()
    steps:
      - name: Verify all required checks passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "Required checks failed"
            exit 1
          fi
          # E2E es "skipped" en feature branches y "success" en PRs a main
          if [[ "${{ needs.e2e.result }}" != "success" && \
                "${{ needs.e2e.result }}" != "skipped" ]]; then
            echo "E2E checks failed"
            exit 1
          fi
          echo "All CI checks passed"
