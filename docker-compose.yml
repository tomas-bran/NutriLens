name: nutrilens

services:
  db:
    image: postgres:16-alpine
    container_name: nutrilens-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutrilens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrilens}
      POSTGRES_DB: ${POSTGRES_DB:-nutrilens}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nutrilens} -d ${POSTGRES_DB:-nutrilens}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nutrilens-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # `.env.local` se carga al levantar el contenedor — ahí viven
    # IA_PROVIDER + AZURE_OPENAI_* + AZURE_AI_FOUNDRY_* + LOG_LEVEL. Los
    # values del bloque `environment:` de abajo tienen precedencia
    # (DATABASE_URL apunta a "db", el hostname de la red de compose).
    env_file:
      - path: .env.local
        required: false
    environment:
      # Inside the compose network, Postgres is reachable as "db".
      DATABASE_URL: postgresql://${POSTGRES_USER:-nutrilens}:${POSTGRES_PASSWORD:-nutrilens}@db:5432/${POSTGRES_DB:-nutrilens}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      # Source bind mount for hot reload.
      - .:/app
      # Keep node_modules inside the container (avoids host/linux/darwin clashes).
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
    name: nutrilens-postgres-data
