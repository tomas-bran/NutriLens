<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 660" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box{fill:#ffffff;stroke:#CBD5E1;stroke-width:1.5;rx:10;}
    .t{font-size:13px;font-weight:bold;fill:#0F172A;}
    .s{font-size:10.5px;fill:#64748B;}
    .lbl{font-size:11px;font-weight:bold;fill:#15803D;}
    .arr{stroke:#16A34A;stroke-width:2;fill:none;marker-end:url(#a);}
    .azure{fill:#F0FDF4;stroke:#86EFAC;stroke-width:1.5;stroke-dasharray:6 5;}
    .acc{fill:#F0FDF4;stroke:#86EFAC;stroke-width:1.5;}
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="20" y="26" font-size="16" font-weight="bold" fill="#0F172A">NutriLens — Arquitectura en la nube (Microsoft Azure)</text>

  <!-- Clientes -->
  <rect class="box" x="20" y="60" width="150" height="58" rx="10"/>
  <text class="t" x="32" y="84">🌐 Navegador web</text>
  <text class="s" x="32" y="102">Next.js (SSR/CSR)</text>
  <rect class="box" x="20" y="132" width="150" height="58" rx="10"/>
  <text class="t" x="32" y="156">📱 App mobile</text>
  <text class="s" x="32" y="174">Expo / React Native</text>

  <!-- OAuth gate -->
  <rect class="acc" x="195" y="96" width="120" height="58" rx="10"/>
  <text class="t" x="207" y="120">🔐 Login</text>
  <text class="s" x="207" y="138">Google OAuth</text>
  <text class="s" x="207" y="151">(Auth.js v5)</text>

  <line class="arr" x1="170" y1="89" x2="193" y2="115"/>
  <line class="arr" x1="170" y1="161" x2="193" y2="135"/>
  <line class="arr" x1="315" y1="125" x2="345" y2="125"/>

  <!-- Azure cloud -->
  <rect class="azure" x="345" y="48" width="500" height="430" rx="16"/>
  <rect x="365" y="36" width="160" height="26" rx="13" fill="#16A34A"/>
  <text x="378" y="54" font-size="12.5" font-weight="bold" fill="#fff">☁ Microsoft Azure · RG nutrilens-rg</text>

  <!-- App Service web -->
  <rect class="box" x="365" y="80" width="180" height="64" rx="10"/>
  <text class="t" x="377" y="103">Azure App Service</text>
  <text class="s" x="377" y="120">nutrilens-app · Next.js 15</text>
  <text class="s" x="377" y="134">UI + API + Auth.js · F1 · Node 22</text>

  <!-- Pipeline -->
  <rect class="acc" x="365" y="158" width="180" height="56" rx="10"/>
  <text class="t" x="377" y="180">Pipeline observable</text>
  <text class="s" x="377" y="197">9 pasos · reglas deterministas</text>

  <!-- IA column -->
  <rect class="box" x="575" y="80" width="250" height="64" rx="10"/>
  <text class="t" x="587" y="103">Azure OpenAI</text>
  <text class="s" x="587" y="120">gpt-5.1 (extracción multimodal)</text>
  <text class="s" x="587" y="134">text-embedding-3-small (RAG)</text>

  <rect class="box" x="575" y="158" width="250" height="56" rx="10" stroke-dasharray="4 4" opacity="0.8"/>
  <text class="t" x="587" y="180">Azure AI Foundry</text>
  <text class="s" x="587" y="197">Phi-3.5 / Phi-4 — descartado (MaaS)</text>

  <!-- Datos row -->
  <rect class="box" x="365" y="238" width="220" height="64" rx="10"/>
  <text class="t" x="377" y="261">Azure DB for PostgreSQL</text>
  <text class="s" x="377" y="278">Flexible Server · nutrilens-db</text>
  <text class="s" x="377" y="292">+ pgvector (HNSW) · historial</text>

  <rect class="box" x="605" y="238" width="220" height="64" rx="10"/>
  <text class="t" x="617" y="261">Azure Blob Storage</text>
  <text class="s" x="617" y="278">nutrilensimg · container uploads</text>
  <text class="s" x="617" y="292">privado · SAS 1h al servir</text>

  <!-- Docs app service -->
  <rect class="box" x="365" y="320" width="460" height="50" rx="10"/>
  <text class="t" x="377" y="342">Azure App Service · nutrilens-docs</text>
  <text class="s" x="377" y="358">Sitio de documentación (Docusaurus) — guías por feature</text>

  <!-- internal arrows -->
  <line class="arr" x1="455" y1="144" x2="455" y2="156"/>
  <line class="arr" x1="545" y1="112" x2="573" y2="112"/>
  <line class="arr" x1="545" y1="186" x2="573" y2="186"/>
  <line class="arr" x1="455" y1="214" x2="455" y2="236"/>
  <line class="arr" x1="585" y1="270" x2="603" y2="270"/>

  <!-- Open Food Facts (externo) -->
  <rect class="box" x="868" y="158" width="96" height="64" rx="10"/>
  <text class="t" x="880" y="181">Open Food</text>
  <text class="t" x="880" y="196">Facts</text>
  <text class="s" x="880" y="212">API externa</text>
  <line class="arr" x1="825" y1="190" x2="866" y2="190"/>

  <!-- CI/CD band -->
  <rect x="20" y="520" width="944" height="118" rx="14" fill="#0B1220"/>
  <text x="40" y="548" font-size="13" font-weight="bold" fill="#C7F04A">CI/CD · DevOps · Entorno de desarrollo</text>
  <rect x="40" y="562" width="290" height="58" rx="10" fill="#13203a"/>
  <text x="54" y="585" font-size="12.5" font-weight="bold" fill="#fff">GitHub Actions</text>
  <text x="54" y="603" font-size="10.5" fill="#9fb3c8">CI/CD · 7 checks (lint, types, unit/int, build, E2E)</text>
  <rect x="350" y="562" width="290" height="58" rx="10" fill="#13203a"/>
  <text x="364" y="585" font-size="12.5" font-weight="bold" fill="#fff">Azure DevOps</text>
  <text x="364" y="603" font-size="10.5" fill="#9fb3c8">Boards · work items ↔ código (auto-close de PRs)</text>
  <rect x="660" y="562" width="284" height="58" rx="10" fill="#13203a"/>
  <text x="674" y="585" font-size="12.5" font-weight="bold" fill="#fff">Docker Compose</text>
  <text x="674" y="603" font-size="10.5" fill="#9fb3c8">Postgres + pgvector local · entorno reproducible</text>

  <line class="arr" x1="120" y1="190" x2="120" y2="518"/>
</svg>
